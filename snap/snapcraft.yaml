name: tail_app
version: 1.5.0
summary: Generated by Icons Launcher
description: Generated by Icons Launcher package for Linux.

confinement: strict
base: core22
grade: stable

slots:
  dbus-tail_app: # adjust accordingly to your app name
    interface: dbus
    bus: session
    name: org.bar.tail_app # adjust accordingly to your app name

apps:
  tail_app:
    command: tail_app
    extensions: [gnome] # gnome includes the libraries required by flutter
    plugs:
    - network
    slots:
      - dbus-tail_app
parts:
  tail_app:
    source: .
    plugin: flutter
    flutter-target: lib/main.dart # The main entry-point file of the application
